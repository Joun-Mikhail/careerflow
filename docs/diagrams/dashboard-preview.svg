<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1000" height="620" fill="#f6f7fb"/>

  <!-- sidebar -->
  <rect width="220" height="620" fill="#0f172a"/>
  <rect x="20" y="24" width="28" height="28" rx="7" fill="#4f46e5"/>
  <text x="58" y="44" fill="#fff" font-size="17" font-weight="700">CareerFlow</text>
  <rect x="16" y="92" width="188" height="38" rx="9" fill="#4f46e5"/>
  <text x="36" y="116" fill="#fff" font-size="13" font-weight="600">Dashboard</text>
  <text x="36" y="160" fill="#cbd5e1" font-size="13">Applications</text>
  <text x="36" y="196" fill="#cbd5e1" font-size="13">Companies</text>
  <text x="36" y="232" fill="#cbd5e1" font-size="13">Tasks</text>
  <text x="36" y="268" fill="#cbd5e1" font-size="13">Analytics</text>
  <circle cx="34" cy="568" r="16" fill="#4f46e5"/>
  <text x="34" y="573" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">DC</text>
  <text x="58" y="565" fill="#fff" font-size="12" font-weight="600">Demo Candidate</text>
  <text x="58" y="580" fill="#64748b" font-size="11">demo@careerflow.app</text>

  <!-- topbar -->
  <rect x="220" y="0" width="780" height="60" fill="#ffffff"/>
  <line x1="220" y1="60" x2="1000" y2="60" stroke="#e2e8f0"/>
  <rect x="936" y="16" width="34" height="28" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>

  <!-- heading -->
  <text x="248" y="100" fill="#0f172a" font-size="22" font-weight="700">Good to see you, Demo 👋</text>
  <text x="248" y="122" fill="#64748b" font-size="13">Here’s where your job search stands today.</text>

  <!-- stat cards -->
  <g>
    <rect x="248" y="142" width="172" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/>
    <text x="268" y="172" fill="#64748b" font-size="11" font-weight="600">APPLICATIONS</text>
    <text x="268" y="208" fill="#0f172a" font-size="30" font-weight="800">8</text>

    <rect x="432" y="142" width="172" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/>
    <text x="452" y="172" fill="#64748b" font-size="11" font-weight="600">INTERVIEWS</text>
    <text x="452" y="208" fill="#0f172a" font-size="30" font-weight="800">3</text>

    <rect x="616" y="142" width="172" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/>
    <text x="636" y="172" fill="#64748b" font-size="11" font-weight="600">OFFERS</text>
    <text x="636" y="208" fill="#0f172a" font-size="30" font-weight="800">1</text>

    <rect x="800" y="142" width="172" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/>
    <text x="820" y="172" fill="#64748b" font-size="11" font-weight="600">SUCCESS RATE</text>
    <text x="820" y="208" fill="#10b981" font-size="30" font-weight="800">25%</text>
  </g>

  <!-- recent applications card -->
  <rect x="248" y="252" width="470" height="336" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <text x="270" y="284" fill="#0f172a" font-size="14" font-weight="700">Applications over the last 12 months</text>
  <line x1="270" y1="300" x2="696" y2="300" stroke="#eef1f7"/>
  <!-- area chart -->
  <polyline points="270,540 310,520 350,500 390,505 430,470 470,455 510,430 550,440 590,400 630,380 670,360 696,350"
            fill="none" stroke="#4f46e5" stroke-width="2.5"/>
  <polygon points="270,540 310,520 350,500 390,505 430,470 470,455 510,430 550,440 590,400 630,380 670,360 696,350 696,560 270,560"
           fill="url(#area)"/>
  <line x1="270" y1="560" x2="696" y2="560" stroke="#e2e8f0"/>

  <!-- side column: upcoming + tasks -->
  <rect x="730" y="252" width="242" height="158" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <text x="750" y="284" fill="#0f172a" font-size="14" font-weight="700">Upcoming interviews</text>
  <circle cx="754" cy="318" r="5" fill="#6366f1"/>
  <text x="770" y="322" fill="#0f172a" font-size="12" font-weight="600">Senior Backend Engineer</text>
  <text x="770" y="338" fill="#94a3b8" font-size="11">in 2 days · Priya Sharma</text>
  <circle cx="754" cy="368" r="5" fill="#6366f1"/>
  <text x="770" y="372" fill="#0f172a" font-size="12" font-weight="600">Platform Engineer</text>
  <text x="770" y="388" fill="#94a3b8" font-size="11">in 5 days · on-site loop</text>

  <rect x="730" y="430" width="242" height="158" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <text x="750" y="462" fill="#0f172a" font-size="14" font-weight="700">Pending tasks</text>
  <text x="750" y="492" fill="#0f172a" font-size="12">Prep system design notes</text>
  <rect x="905" y="481" width="48" height="16" rx="8" fill="#fde7d4"/>
  <text x="929" y="493" fill="#d97706" font-size="9" font-weight="700" text-anchor="middle">high</text>
  <text x="750" y="520" fill="#0f172a" font-size="12">Send availability email</text>
  <rect x="905" y="509" width="48" height="16" rx="8" fill="#fde7d4"/>
  <text x="929" y="521" fill="#d97706" font-size="9" font-weight="700" text-anchor="middle">high</text>
  <text x="750" y="548" fill="#0f172a" font-size="12">Respond to offer</text>
  <rect x="897" y="537" width="56" height="16" rx="8" fill="#fef3da"/>
  <text x="925" y="549" fill="#b45309" font-size="9" font-weight="700" text-anchor="middle">medium</text>
</svg>
