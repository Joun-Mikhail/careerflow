<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <title>Get CareerFlow — App Store, Google Play, or Web</title>
    <meta
      name="description"
      content="Install CareerFlow on iOS, Android, or your browser. One link, three install paths."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      :root {
        --brand: #4f46e5;
        --brand-700: #4338ca;
        --ink: #0f172a;
        --muted: #475569;
        --bg: #f7fafc;
        --surface: #ffffff;
        --border: #e2e8f0;
        --radius: 14px;
        --shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 16px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 720px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 36px;
        box-shadow: var(--shadow);
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: var(--brand);
        margin: 0 auto 16px;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -1px;
      }
      h1 { font-size: 1.8rem; margin: 0 0 8px; }
      .lede { color: var(--muted); margin: 0 auto 24px; max-width: 480px; }
      .badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 18px 0 8px; }
      .badge {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 12px;
        background: var(--ink);
        color: #fff;
        font-weight: 600;
        transition: transform 0.15s ease, opacity 0.15s ease;
        min-width: 200px;
        justify-content: center;
      }
      .badge:hover { transform: translateY(-1px); }
      .badge.dim { opacity: 0.45; }
      .badge .sub { display: block; font-size: 11px; font-weight: 500; opacity: 0.75; text-align: left; }
      .badge .title { display: block; font-size: 16px; text-align: left; }
      .badge svg { width: 22px; height: 22px; flex-shrink: 0; }
      .pwa-btn {
        display: inline-block;
        margin-top: 14px;
        padding: 12px 22px;
        background: var(--brand);
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        border: 0;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .pwa-btn:hover { background: var(--brand-700); }
      .pwa-hint { color: var(--muted); font-size: 13px; margin: 12px 0 0; }
      .footer {
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }
      .footer a { color: var(--brand); text-decoration: none; }
      .footer a:hover { text-decoration: underline; }
      .platform-note { font-size: 13px; color: var(--muted); margin-top: 6px; }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #e2e8f0;
          --muted: #94a3b8;
          --bg: #0f172a;
          --surface: #1e293b;
          --border: #334155;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">C</div>
      <h1>Get CareerFlow</h1>
      <p class="lede">
        Track your job applications, interviews, tasks, and offers — on whatever device
        you carry.
      </p>

      <div class="badges" id="badges">
        <a id="appstore-link" class="badge" href="#" aria-label="Download on the App Store" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M16.4 12.6c0-2.6 2.1-3.8 2.2-3.9-1.2-1.8-3.1-2-3.7-2-1.6-.2-3.1.9-3.9.9-.8 0-2-.9-3.3-.9-1.7 0-3.2 1-4.1 2.5-1.8 3-.4 7.5 1.3 9.9.8 1.2 1.8 2.6 3.1 2.5 1.2 0 1.7-.8 3.2-.8s2 .8 3.3.8c1.4 0 2.2-1.2 3.1-2.4 1-1.4 1.4-2.7 1.4-2.8 0-.1-2.6-1-2.6-3.8zM14 4.5c.7-.8 1.1-2 1-3.1-1 0-2.2.7-2.9 1.5-.6.7-1.2 1.9-1 3 1.1.1 2.2-.6 2.9-1.4z"/>
          </svg>
          <span>
            <span class="sub">Download on the</span>
            <span class="title">App Store</span>
          </span>
        </a>
        <a id="playstore-link" class="badge" href="#" aria-label="Get it on Google Play" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.6 1.7c-.4.4-.6 1-.6 1.7v17.2c0 .7.2 1.3.6 1.7l9.2-10.3L3.6 1.7zm12.8 11l-2.4 2.7L4.7 23.4l11.7-6.7v-4zm0-1.4v-4L4.7.6l9.3 8 2.4 2.7zm5 .7c0-.7-.4-1.4-1-1.7l-3-1.7-2.6 2.9 2.6 2.9 3-1.7c.6-.3 1-1 1-1.7z"/>
          </svg>
          <span>
            <span class="sub">Get it on</span>
            <span class="title">Google Play</span>
          </span>
        </a>
      </div>
      <p class="platform-note" id="platform-note"></p>

      <div style="margin-top: 18px">
        <button id="pwa-install" class="pwa-btn" type="button">Install as Web App</button>
        <p class="pwa-hint" id="pwa-hint">Works in Chrome, Edge, Safari (Add to Home Screen), and Firefox Android.</p>
      </div>

      <div class="footer">
        Already installed? <a href="/">Open CareerFlow</a> ·
        <a href="/privacy/">Privacy</a> ·
        <a href="https://github.com/Joun-Mikhail/careerflow">Source on GitHub</a>
      </div>
    </main>

    <script>
      (function () {
        // ----- Store URLs ----------------------------------------------------
        // Replace placeholder IDs with the real store entries once published.
        var APPSTORE_URL = 'https://apps.apple.com/app/id000000000';
        var PLAYSTORE_URL = 'https://play.google.com/store/apps/details?id=com.careerflow.app';

        var appBtn = document.getElementById('appstore-link');
        var playBtn = document.getElementById('playstore-link');
        var note = document.getElementById('platform-note');
        appBtn.href = APPSTORE_URL;
        playBtn.href = PLAYSTORE_URL;

        // ----- Platform detection -------------------------------------------
        var ua = navigator.userAgent || '';
        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

        if (isIOS) {
          playBtn.classList.add('dim');
          note.textContent = "On iOS? Tap App Store, or use Safari's Share menu → Add to Home Screen for the web app.";
        } else if (isAndroid) {
          appBtn.classList.add('dim');
          note.textContent = 'On Android? Tap Google Play, or install the web app from Chrome.';
        } else {
          note.textContent = 'On desktop? Install the web app — it opens in its own window like a native app.';
        }

        // ----- PWA install prompt -------------------------------------------
        var deferredPrompt = null;
        var pwaBtn = document.getElementById('pwa-install');
        var pwaHint = document.getElementById('pwa-hint');

        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
          pwaHint.textContent = 'Ready to install.';
        });

        pwaBtn.addEventListener('click', function () {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function () { deferredPrompt = null; });
            return;
          }
          if (isIOS) {
            alert("On iOS, tap the Share button in Safari and choose 'Add to Home Screen'.");
          } else {
            alert("If your browser supports it, open the page menu and choose 'Install' or 'Add to Home Screen'.");
          }
        });
      })();
    </script>
  </body>
</html>
