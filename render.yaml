# Render Blueprint — one-click deploy for CareerFlow.
# https://render.com/docs/blueprint-spec
#
# Provisions:
#   1. A managed PostgreSQL database
#   2. The FastAPI backend (Docker, runs migrations + seeds demo data on first boot)
#   3. The React frontend (static site, points at the backend URL)
#
# Use the "Deploy to Render" button in the README, or `render blueprint launch`.
databases:
  - name: careerflow-db
    plan: free
    databaseName: careerflow
    user: careerflow

services:
  - type: web
    name: careerflow-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CAREERFLOW_ENV
        value: production
      - key: SEED_DEMO_DATA
        value: "true"
      - key: CORS_ORIGINS
        sync: false  # set after the frontend URL is known
      - key: PORT
        value: "8000"

  - type: web
    name: careerflow-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # set to https://<careerflow-api>.onrender.com/api/v1
